services:
  # ── Application Django principale ──
  - type: web
    name: chronicare
    env: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate --no-input || (sleep 5 && python manage.py migrate --no-input) && gunicorn ChroniCare.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ChroniCare.settings
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: chronicare-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: chronicare-redis
          type: redis
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: chronicare.onrender.com

  # ── Worker Celery ──
  - type: worker
    name: chronicare-celery
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A ChroniCare worker -l info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ChroniCare.settings
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chronicare-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: chronicare-redis
          type: redis
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false

  # ── Celery Beat (tâches planifiées) ──
  - type: worker
    name: chronicare-beat
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A ChroniCare beat -l info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ChroniCare.settings
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chronicare-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: chronicare-redis
          type: redis
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false

  # ── Redis (broker Celery) ──
  - type: redis
    name: chronicare-redis
    plan: free
    ipAllowList: []  # accessible uniquement depuis les services Render

databases:
  # ── PostgreSQL ──
  - name: chronicare-db
    databaseName: chronicare
    user: chronicare_user
    plan: free
