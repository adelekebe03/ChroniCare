{% extends 'core/base.html' %}

{% block content %}

<h2 class="mb-4">Tableau de bord 🏥</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>Patients</h5>
                <h2>{{ patients_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>Consultations</h5>
                <h2>{{ consultations_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>Rendez-vous</h5>
                <h2>{{ appointments_count }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>Alertes</h5>
                <h2>{{ alerts_count }}</h2>
            </div>
        </div>
    </div>

</div>

{% endblock %}
