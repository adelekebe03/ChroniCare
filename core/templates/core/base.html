<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ChroniCare{% endblock %}</title>

  <!-- Tabler Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css" rel="stylesheet">
  <!-- Bootstrap 5 (utilisé par certains templates d'autres apps) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --cc-teal:       #0F6E56;
      --cc-teal-dark:  #085041;
      --cc-teal-mid:   #1D9E75;
      --cc-teal-light: #E1F5EE;
      --cc-sidebar-w:  240px;
      --cc-nav-h:      56px;
      --cc-bg:         #F4F9FC;
      --cc-border:     rgba(0,0,0,.08);
      --cc-text:       #1C2833;
      --cc-text-muted: #717D7E;
      --cc-radius:     12px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: var(--cc-text);
      background: var(--cc-bg);
      margin: 0;
    }

    /* ── Layout principal ────────────────────────────────────────── */
    .cc-main {
      margin-top: var(--cc-nav-h);
      margin-left: var(--cc-sidebar-w);
      min-height: calc(100vh - var(--cc-nav-h));
      padding: 24px;
      background: var(--cc-bg);
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .cc-sidebar { transform: translateX(-100%); transition: transform .25s; }
      .cc-sidebar.open { transform: translateX(0); }
      .cc-main { margin-left: 0; }
    }

    /* ── Flash messages ──────────────────────────────────────────── */
    .cc-messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .cc-msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 13px;
      border: 1px solid transparent;
      position: relative;
    }
    .cc-msg i { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .cc-msg-body { flex: 1; }
    .cc-msg-close {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: inherit; opacity: .6;
      padding: 0; line-height: 1; flex-shrink: 0;
    }
    .cc-msg-close:hover { opacity: 1; }
    .cc-msg.success { background: #E1F5EE; color: #085041; border-color: #C5E5D5; }
    .cc-msg.error   { background: #FCEBEB; color: #791F1F; border-color: #F0D5D5; }
    .cc-msg.warning { background: #FAEEDA; color: #633806; border-color: #F0E0C0; }
    .cc-msg.info    { background: #E6F1FB; color: #0C447C; border-color: #C5D8EF; }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<!-- data-role permet au CSS/JS de cibler les styles par rôle sans logique serveur -->
<body data-role="{{ request.user.role|default:'' }}">

  {% include 'core/navbar.html' %}
  {% include 'core/sidebar.html' %}

  <main class="cc-main" id="ccMain">

    <!-- ── Flash messages Django ─────────────────────────────────── -->
    {% if messages %}
      <div class="cc-messages" role="alert" aria-live="polite">
        {% for message in messages %}
          <div class="cc-msg {% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}">
            <i class="ti
              {% if message.tags == 'error' %}ti-alert-circle
              {% elif message.tags == 'success' %}ti-circle-check
              {% elif message.tags == 'warning' %}ti-alert-triangle
              {% else %}ti-info-circle{% endif %}">
            </i>
            <div class="cc-msg-body">{{ message }}</div>
            <button class="cc-msg-close" onclick="this.parentElement.remove()" aria-label="Fermer">
              <i class="ti ti-x"></i>
            </button>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      /* ── Toggle sidebar mobile ── */
      const toggler = document.getElementById('sidebarToggler');
      const sidebar = document.getElementById('ccSidebar');
      if (toggler && sidebar) {
        toggler.addEventListener('click', () => sidebar.classList.toggle('open'));
        /* Ferme la sidebar si on clique en dehors sur mobile */
        document.addEventListener('click', function (e) {
          if (window.innerWidth <= 768 &&
              !sidebar.contains(e.target) &&
              !toggler.contains(e.target)) {
            sidebar.classList.remove('open');
          }
        });
      }

      /* ── Lien actif dans la sidebar ── */
      const currentPath = window.location.pathname;
      document.querySelectorAll('.cc-nav-link').forEach(link => {
        const href = link.getAttribute('href');
        if (href && href !== '/' && currentPath.startsWith(href)) {
          link.classList.add('active');
        } else if (href === currentPath) {
          link.classList.add('active');
        }
      });
    });
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
